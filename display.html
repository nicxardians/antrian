<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display Antrian</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  html, body { height: 100%; overflow: hidden; }
  body { background: #0f172a; color: #fff; display: flex; flex-direction: column; }

  .header {
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    padding: 1vh 1vw;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: relative;
    min-height: 10vh;
  }

  .header-logo {
    position: absolute; left: 1.2vw; top: 50%; transform: translateY(-50%);
    display: flex; align-items: center; gap: 1vw;
  }
  .header-logo img {
    height: 8vh;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.6));
  }
  .header-logo-text {
    display: flex; flex-direction: column; justify-content: center;
    line-height: 1.5;
  }
  .header-logo-text .instansi {
    font-size: 0.85vw;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .header-logo-text .nama {
    font-size: 1.05vw;
    font-weight: 800;
    color: #f0c060;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-title {
    font-size: 2vw; font-weight: 700; letter-spacing: 4px;
    text-align: center;
  }

  .main {
    flex: 1; display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1vw; padding: 1vw;
  }
  .panel {
    border-radius: 16px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2vw; text-align: center;
  }
  .panel.loket       { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
  .panel.pendaftaran { background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); }
  .panel .label { font-size: 2.2vw; letter-spacing: 4px; opacity: 0.9; margin-bottom: 1vw; }
  .panel .num   { font-size: 18vw; font-weight: 900; line-height: 1; text-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .panel .num.flash { animation: flash 0.6s ease 3; }
  @keyframes flash {
    0%, 100% { color: #fff; transform: scale(1); }
    50%       { color: #fef08a; transform: scale(1.05); }
  }
  .fs-btn {
    position: fixed; bottom: 12px; left: 16px;
    background: rgba(255,255,255,0.15); color: #fff;
    border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
    padding: 6px 12px; font-size: 12px; cursor: pointer; z-index: 10;
  }
  .clock {
    position: absolute; right: 1.5vw; top: 50%; transform: translateY(-50%);
    text-align: right; line-height: 1.4;
  }
  .clock .jam {
    font-size: 1.8vw; font-weight: 700; letter-spacing: 3px; color: #fff;
  }
  .clock .tanggal {
    font-size: 1.1vw; font-weight: 600;
    color: rgba(255,255,255,0.85); letter-spacing: 0.5px; margin-top: 3px;
  }
  .conn-dot {
    position: fixed; top: 8px; right: 16px;
    width: 8px; height: 8px; border-radius: 50%;
    background: #fbbf24;
  }
  .conn-dot.on  { background: #4ade80; }
  .conn-dot.off { background: #f87171; }
  .overlay { position: fixed; inset: 0; z-index: 999; background: transparent; cursor: default; }
</style>
</head>

      <div class="header-logo-text">
        <div class="instansi">KANTOR WILAYAH DKI JAKARTA</div>
        <div class="nama">LAPAS PEREMPUAN KELAS IIA JAKARTA</div>
      </div>
    </div>
    <div class="header-title">SISTEM ANTRIAN</div>
    <div class="clock">
      <div class="jam" id="clockJam">00:00:00</div>
      <div class="tanggal" id="clockTanggal">—</div>
    </div>
  </div>

  <div class="main">
    <div class="panel pendaftaran">
      <div class="label">PENDAFTARAN</div>
      <div class="num" id="numNext">-</div>
    </div>
    <div class="panel loket">
      <div class="label">PEMERIKSAAN BARANG</div>
      <div class="num" id="numNow">-</div>
    </div>
  </div>


<script>
  function toggleFs() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  function fmt(n) { return String(n); }
  const HARI  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  function tickClock() {
    const d = new Date();
    const jam = String(d.getHours()).padStart(2,'0')+':'+
                String(d.getMinutes()).padStart(2,'0')+':'+
                String(d.getSeconds()).padStart(2,'0');
    const tgl = HARI[d.getDay()]+', '+d.getDate()+' '+BULAN[d.getMonth()]+' '+d.getFullYear();
    document.getElementById('clockJam').textContent     = jam;
    document.getElementById('clockTanggal').textContent = tgl;
  }
  tickClock(); setInterval(tickClock, 1000);

  let voice = null;
  function loadVoice() {
    const list = speechSynthesis.getVoices();
    voice = list.find(v => /id|indonesia/i.test(v.lang) && /female|wanita|damayanti/i.test(v.name))
         || list.find(v => /id|indonesia/i.test(v.lang))
         || list.find(v => /female|samantha|zira/i.test(v.name));
  }
  speechSynthesis.onvoiceschanged = loadVoice; loadVoice();

  function terbilang(n) {
    n = parseInt(n, 10);
    const angka = ['nol','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan','sepuluh','sebelas'];
    if (n < 12) return angka[n];
    if (n < 20) return terbilang(n-10)+' belas';
    if (n < 100) {
      const puluh = Math.floor(n/10), sisa = n%10;
      return terbilang(puluh)+' puluh' + (sisa>0 ? ' '+terbilang(sisa) : '');
    }
    if (n < 200) return 'seratus' + (n-100>0 ? ' '+terbilang(n-100) : '');
    if (n < 1000) {
      const ratus = Math.floor(n/100), sisa = n%100;
      return terbilang(ratus)+' ratus' + (sisa>0 ? ' '+terbilang(sisa) : '');
    }
    return String(n);
  }
  function bicara(teks) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(teks);
    u.lang='id-ID'; u.pitch=1.3; u.rate=0.9;
    if (voice) u.voice = voice;
    speechSynthesis.speak(u);
  }
  function ding() {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [880,1100].forEach((freq,i) => {
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.frequency.value=freq; osc.type='sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime+i*0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*0.2+0.3);
      osc.connect(gain).connect(ctx.destination);
      osc.start(ctx.currentTime+i*0.2); osc.stop(ctx.currentTime+i*0.2+0.3);
    });
  }
  function handleSuara(event, state) {
    if (!event) return;
    if (event==='panggilPendaftaran'||event==='ulangPendaftaran') {
      if (!state.pendaftaran) return;
      ding(); setTimeout(()=>bicara('Nomor antrian '+terbilang(state.pendaftaran)+', mohon menuju pendaftaran.'),700);
    } else if (event==='panggil'||event==='ulangPemeriksaan') {
      if (!state.now) return;
      ding(); setTimeout(()=>bicara('Nomor antrian '+terbilang(state.now)+', silakan ke pemeriksaan barang.'),700);
    }
  }
  let prevNow=null, prevNext=null;
  function doFlash(el) { el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }
  function applyState(s, event) {
    if (!s) return;
    const now=s.now||null, pendaftaran=s.pendaftaran||null;
    const qPemeriksaan=s.qPemeriksaan||[], lastPendaftaran=s.lastPendaftaran||null;
    const elNow=document.getElementById('numNow'), elNext=document.getElementById('numNext');
    elNow.textContent = now ? fmt(now) : '-';
    if (now&&(now!==prevNow||event==='ulangPemeriksaan')) doFlash(elNow);
    prevNow=now;
    const masihAda = pendaftaran!==null||qPemeriksaan.length>0;
    const tampil   = (lastPendaftaran&&masihAda) ? lastPendaftaran : null;
    elNext.textContent = tampil ? fmt(tampil) : '-';
    if (tampil&&(tampil!==prevNext||event==='ulangPendaftaran')) doFlash(elNext);
    prevNext=tampil;
  }
  let ws, reconnectTimer;
  function connect() {
    const host=location.hostname, port=location.port||3000;
    ws=new WebSocket('ws://'+host+':'+port);
    ws.onopen  = ()=>{ document.getElementById('connDot').className='conn-dot on'; clearTimeout(reconnectTimer); };
    ws.onclose = ()=>{ document.getElementById('connDot').className='conn-dot off'; reconnectTimer=setTimeout(connect,3000); };
    ws.onerror = ()=>{ document.getElementById('connDot').className='conn-dot off'; };
    ws.onmessage = (e)=>{ const msg=JSON.parse(e.data); if(msg.type==='state'){applyState(msg.state,msg.event);handleSuara(msg.event,msg.state);} };
  }
  let audioUnlocked=false;
  function mulai() {
    if(audioUnlocked) return; audioUnlocked=true;
    const ctx=new (window.AudioContext||window.webkitAudioContext)(); ctx.resume();
    speechSynthesis.cancel(); speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    loadVoice(); document.getElementById('overlay').style.display='none';
  }
  ['mousemove','mousedown','touchstart','keydown','scroll'].forEach(ev=>{
    document.addEventListener(ev, mulai, {once:true});
  });
  connect();
</script>
